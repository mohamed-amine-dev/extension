<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VariantSnap</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div class="app">

    <!-- Header -->
    <header class="header">
      <div class="logo">
        <div class="logo-icon">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
            <path d="M23 19a2 2 0 01-2 2H3a2 2 0 01-2-2V8a2 2 0 012-2h4l2-3h6l2 3h4a2 2 0 012 2z"
              stroke="url(#g1)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            <circle cx="12" cy="13" r="4" stroke="url(#g1)" stroke-width="2"/>
            <defs>
              <linearGradient id="g1" x1="0" y1="0" x2="24" y2="24" gradientUnits="userSpaceOnUse">
                <stop stop-color="#a78bfa"/><stop offset="1" stop-color="#38bdf8"/>
              </linearGradient>
            </defs>
          </svg>
        </div>
        <div>
          <span class="logo-name">VariantSnap</span>
          <span class="logo-sub">All images → WebP download</span>
        </div>
      </div>
      <!-- WebP badge always shown -->
      <div class="webp-badge">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <polyline points="20 6 9 17 4 12"/>
        </svg>
        WebP
      </div>
    </header>

    <!-- Scan + filter row -->
    <div class="toolbar">
      <button class="scan-btn" id="scanBtn">
        <svg class="scan-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/>
        </svg>
        <span id="scanBtnText">Scan Page</span>
      </button>

      <!-- Select Mode Toggle -->
      <button class="select-toggle-btn" id="selectModeBtn" title="Select multiple images">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <polyline points="20 6 9 17 4 12"/>
        </svg>
        Select
      </button>

      <div class="filter-chips" id="filterChips">
        <button class="chip active" data-type="all">All</button>
        <button class="chip" data-type="gif">GIF</button>
        <button class="chip" data-type="png">PNG</button>
        <button class="chip" data-type="jpg">JPG</button>
        <button class="chip" data-type="webp">WebP</button>
        <button class="chip" data-type="svg">SVG</button>
      </div>
    </div>

    <!-- Progress -->
    <div class="progress-wrap hidden" id="progressWrap">
      <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
      <p class="progress-msg" id="progressMsg">Scanning...</p>
    </div>

    <!-- Stats row when images loaded -->
    <div class="stats-row hidden" id="statsRow">
      <span id="imgCountLabel">0 images found</span>
      <span class="stats-hint" id="statsHint">Click <svg class="inline-icon" width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg> to save · or <strong>Select</strong> mode for bulk</span>
    </div>

    <!-- Image Grid -->
    <div class="image-grid" id="imageGrid"></div>

    <!-- Empty state -->
    <div class="empty-state" id="emptyState">
      <div class="empty-icon">
        <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" opacity="0.3">
          <rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/>
          <polyline points="21 15 16 10 5 21"/>
        </svg>
      </div>
      <p class="empty-title">No images yet</p>
      <p class="empty-sub">Go to any page and click <strong>Scan Page</strong></p>
    </div>

    <!-- Toast notification -->
    <div class="toast hidden" id="toast"></div>

    <!-- Floating selection bar (shown in select mode when items are picked) -->
    <div class="selection-bar hidden" id="selectionBar">
      <div class="sel-info">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <polyline points="20 6 9 17 4 12"/>
        </svg>
        <span id="selCountLabel">0 selected</span>
      </div>
      <div class="sel-actions">
        <button class="sel-btn sel-all" id="selAllBtn">All</button>
        <button class="sel-btn sel-none" id="selNoneBtn">None</button>
        <button class="sel-btn sel-download" id="selDownloadBtn">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/>
            <polyline points="7 10 12 15 17 10"/>
            <line x1="12" y1="15" x2="12" y2="3"/>
          </svg>
          Download <span id="selDownloadCount">0</span>
        </button>
      </div>
    </div>

    <!-- Per-image fullsize overlay -->
    <div class="preview-overlay hidden" id="previewOverlay">
      <div class="preview-box">
        <button class="preview-close" id="previewClose">✕</button>
        <div class="preview-img-wrap">
          <img id="previewImg" src="" alt="" />
        </div>
        <div class="preview-footer">
          <div class="preview-meta" id="previewMeta"></div>
          <button class="dl-icon-btn large" id="previewDlBtn" title="Download as WebP">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
              <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/>
              <polyline points="7 10 12 15 17 10"/>
              <line x1="12" y1="15" x2="12" y2="3"/>
            </svg>
            Download as WebP
          </button>
        </div>
      </div>
    </div>

  </div>
  <script src="popup.js"></script>
</body>
</html>
